version: 1

project:
  timezone: UTC
  data_directory: data

database:
  # Relative paths use the working directory for the packaged default and the
  # configuration file's directory when WARTOSC_CONFIG_PATH is provided.
  # SQLite is for local research; PostgreSQL is the expected scale-up path.
  url: sqlite:///data/wartosc.db
  echo: false

exchanges:
  hyperliquid:
    adapter: wartosc_perp_research.collectors.hyperliquid.HyperliquidCollector
    enabled: false
    # Most info requests cost 20 weight against a 1,200 weight/minute limit.
    # Stay below the theoretical one-request/second ceiling for headroom.
    rate_limit_per_second: 0.5
    options:
      api_url: https://api.hyperliquid.xyz/info
      timeout_seconds: 15
      max_retries: 3
      funding_interval_seconds: 3600

  binance:
    adapter: wartosc_perp_research.collectors.binance.BinanceCollector
    enabled: false
    rate_limit_per_second: 5
    options: {}

  variational:
    adapter: wartosc_perp_research.collectors.variational.VariationalCollector
    enabled: false
    rate_limit_per_second: 2
    options: {}

  lighter:
    adapter: wartosc_perp_research.collectors.lighter.LighterCollector
    enabled: false
    rate_limit_per_second: 2
    options: {}
